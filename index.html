<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ジョイフル本田 あるある タイピング</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
  background: #f4f4f0;
  min-height: 100vh;
  display: flex; align-items: flex-start; justify-content: center;
  padding: 1rem;
}
.card {
  background: #fff;
  border-radius: 16px;
  padding: 1.5rem;
  max-width: 680px;
  width: 100%;
  box-shadow: 0 4px 24px rgba(0,0,0,0.09);
  margin-top: 1rem;
}
h1 { font-size: 18px; font-weight: 700; color: #111; text-align:center; margin-bottom:4px; }
.sub { font-size:11px; color:#aaa; text-align:center; letter-spacing:.12em; margin-bottom:1.5rem; }

.stats { display:flex; gap:8px; margin-bottom:1rem; }
.stat { flex:1; background:#f4f4f0; border-radius:10px; padding:8px 4px; text-align:center; }
.stat-l { font-size:10px; color:#999; margin-bottom:2px; }
.stat-v { font-size:16px; font-weight:700; color:#111; }

.prog-wrap { height:4px; background:#eee; border-radius:2px; margin-bottom:1rem; overflow:hidden; }
.prog-bar { height:100%; background:#111; border-radius:2px; transition:width .3s; }

.phrase-box {
  background:#f9f9f7; border:1.5px solid #e8e8e4; border-radius:12px;
  padding:1rem 1.2rem; margin-bottom:6px;
  min-height:56px; display:flex; flex-wrap:wrap; align-items:center;
  font-size:1.4rem; line-height:2.2; font-family:'Courier New',monospace;
  cursor: text;
}
.c-done { color:#ccc; }
.c-cur  { color:#111; background:#dbeafe; border-radius:3px; padding:0 1px; }
.c-pend { color:#ddd; }

.ro-hint {
  font-size:13px; font-family:'Courier New',monospace;
  color:#999; padding:2px 4px 8px; min-height:22px;
}

/* 隠し入力欄（スマホキーボード呼び出し用） */
#inp {
  position: fixed;
  left: -9999px;
  top: 50%;
  width: 1px;
  height: 1px;
  opacity: 0;
  font-size: 16px; /* iOSズーム防止 */
}

.tap-hint {
  text-align: center;
  font-size: 13px;
  color: #aaa;
  margin-bottom: 8px;
  padding: 6px;
  border: 1.5px dashed #ddd;
  border-radius: 8px;
  cursor: pointer;
  user-select: none;
}
.tap-hint.active {
  color: #111;
  border-color: #111;
  background: #f9f9f7;
}

.btn-row { display:flex; gap:8px; margin-bottom:6px; }
.btn-row button { flex:1; }

button {
  background:#111; color:#fff; border:none; border-radius:8px;
  padding:12px 20px; font-size:15px; cursor:pointer;
  font-family:inherit; font-weight:600;
  -webkit-appearance: none;
  touch-action: manipulation;
}
button:active { background:#333; }
button.secondary {
  background: #fff; color: #111;
  border: 1.5px solid #ddd;
}
button.secondary:active { background: #f4f4f0; }

.err { font-size:12px; color:#e53e3e; min-height:18px; padding-left:2px; margin-bottom: 4px; }

.start-screen, .result-screen { text-align:center; padding:2rem 0; }
.start-screen p { font-size:15px; color:#666; line-height:1.9; margin-bottom:1.5rem; }
.start-screen button { font-size:17px; padding:16px 48px; width: 100%; }

.res-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:1.5rem 0; }
.res-box { background:#f4f4f0; border-radius:10px; padding:1rem; text-align:center; }
.res-l { font-size:11px; color:#999; margin-bottom:4px; }
.res-v { font-size:20px; font-weight:700; color:#111; }

.result-screen button { width: 100%; font-size: 16px; padding: 14px; }
</style>
</head>
<body>
<div class="card">
  <h1>ジョイフル本田 あるある タイピング</h1>
  <p class="sub">JOYFUL HONDA TYPING GAME</p>

  <!-- START -->
  <div class="start-screen" id="scr-start">
    <p>ジョイフル本田あるあるを<br>ローマ字でタイピングしよう！<br>全14フレーズに挑戦！</p>
    <button id="btn-start">スタート</button>
  </div>

  <!-- GAME -->
  <div id="scr-game" style="display:none">
    <div class="stats">
      <div class="stat"><div class="stat-l">フレーズ</div><div class="stat-v"><span id="s-idx">1</span>/<span id="s-tot"></span></div></div>
      <div class="stat"><div class="stat-l">タイム</div><div class="stat-v"><span id="s-time">0.0</span>s</div></div>
      <div class="stat"><div class="stat-l">正確率</div><div class="stat-v"><span id="s-acc">100</span>%</div></div>
      <div class="stat"><div class="stat-l">ミス</div><div class="stat-v"><span id="s-miss">0</span></div></div>
    </div>
    <div class="prog-wrap"><div class="prog-bar" id="prog" style="width:0%"></div></div>
    <div class="phrase-box" id="phrase"></div>
    <div class="ro-hint" id="hint"></div>
    <div class="err" id="err"></div>

    <!-- タップでキーボード表示 -->
    <div class="tap-hint" id="tap-hint" onclick="focusInput()">
      ⌨️ ここをタップしてキーボードを開く
    </div>

    <div class="btn-row">
      <button class="secondary" id="btn-skip">スキップ</button>
    </div>

    <!-- 隠し入力欄 -->
    <input id="inp" type="text"
      autocomplete="off" autocorrect="off"
      autocapitalize="off" spellcheck="false"
      inputmode="text">
  </div>

  <!-- RESULT -->
  <div class="result-screen" id="scr-result" style="display:none">
    <div style="font-size:22px;font-weight:700;margin-bottom:6px;">お疲れ様でした！</div>
    <div style="font-size:13px;color:#aaa;margin-bottom:4px;">全フレーズクリア</div>
    <div class="res-grid">
      <div class="res-box"><div class="res-l">タイム</div><div class="res-v" id="r-time">-</div></div>
      <div class="res-box"><div class="res-l">正確率</div><div class="res-v" id="r-acc">-</div></div>
      <div class="res-box"><div class="res-l">ミス数</div><div class="res-v" id="r-miss">-</div></div>
    </div>
    <button id="btn-retry">もう一度</button>
  </div>
</div>

<script>
// ================================================================
// かな→ローマ字テーブル
// ================================================================
const TABLE = [
  ['しゃ',['sha','sya']], ['しゅ',['shu','syu']], ['しょ',['sho','syo']],
  ['ちゃ',['cha','tya','cya']], ['ちゅ',['chu','tyu','cyu']], ['ちょ',['cho','tyo','cyo']],
  ['じゃ',['ja','zya','jya']], ['じゅ',['ju','zyu','jyu']], ['じょ',['jo','zyo','jyo']],
  ['にゃ',['nya']], ['にゅ',['nyu']], ['にょ',['nyo']],
  ['ひゃ',['hya']], ['ひゅ',['hyu']], ['ひょ',['hyo']],
  ['みゃ',['mya']], ['みゅ',['myu']], ['みょ',['myo']],
  ['りゃ',['rya']], ['りゅ',['ryu']], ['りょ',['ryo']],
  ['ぎゃ',['gya']], ['ぎゅ',['gyu']], ['ぎょ',['gyo']],
  ['きゃ',['kya']], ['きゅ',['kyu']], ['きょ',['kyo']],
  ['びゃ',['bya']], ['びゅ',['byu']], ['びょ',['byo']],
  ['ぴゃ',['pya']], ['ぴゅ',['pyu']], ['ぴょ',['pyo']],
  ['あ',['a']], ['い',['i']], ['う',['u']], ['え',['e']], ['お',['o']],
  ['か',['ka']], ['き',['ki']], ['く',['ku']], ['け',['ke']], ['こ',['ko']],
  ['が',['ga']], ['ぎ',['gi']], ['ぐ',['gu']], ['げ',['ge']], ['ご',['go']],
  ['さ',['sa']], ['し',['shi','si']], ['す',['su']], ['せ',['se']], ['そ',['so']],
  ['ざ',['za']], ['じ',['ji','zi']], ['ず',['zu']], ['ぜ',['ze']], ['ぞ',['zo']],
  ['た',['ta']], ['ち',['chi','ti']], ['つ',['tsu','tu']], ['て',['te']], ['と',['to']],
  ['だ',['da']], ['ぢ',['di','ji']], ['づ',['du','zu']], ['で',['de']], ['ど',['do']],
  ['な',['na']], ['に',['ni']], ['ぬ',['nu']], ['ね',['ne']], ['の',['no']],
  ['は',['ha']], ['ひ',['hi']], ['ふ',['fu','hu']], ['へ',['he']], ['ほ',['ho']],
  ['ば',['ba']], ['び',['bi']], ['ぶ',['bu']], ['べ',['be']], ['ぼ',['bo']],
  ['ぱ',['pa']], ['ぴ',['pi']], ['ぷ',['pu']], ['ぺ',['pe']], ['ぽ',['po']],
  ['ま',['ma']], ['み',['mi']], ['む',['mu']], ['め',['me']], ['も',['mo']],
  ['や',['ya']], ['ゆ',['yu']], ['よ',['yo']],
  ['ら',['ra']], ['り',['ri']], ['る',['ru']], ['れ',['re']], ['ろ',['ro']],
  ['わ',['wa']], ['を',['wo','o']], ['ん',['n','nn']],
  ['っ',['xtu','ltu']],
  ['ア',['a']], ['イ',['i']], ['ウ',['u']], ['エ',['e']], ['オ',['o']],
  ['カ',['ka']], ['キ',['ki']], ['ク',['ku']], ['ケ',['ke']], ['コ',['ko']],
  ['サ',['sa']], ['シ',['shi','si']], ['ス',['su']], ['セ',['se']], ['ソ',['so']],
  ['タ',['ta']], ['チ',['chi','ti']], ['ツ',['tsu','tu']], ['テ',['te']], ['ト',['to']],
  ['ナ',['na']], ['ニ',['ni']], ['ヌ',['nu']], ['ネ',['ne']], ['ノ',['no']],
  ['ハ',['ha']], ['ヒ',['hi']], ['フ',['fu','hu']], ['ヘ',['he']], ['ホ',['ho']],
  ['バ',['ba']], ['ビ',['bi']], ['ブ',['bu']], ['ベ',['be']], ['ボ',['bo']],
  ['パ',['pa']], ['ピ',['pi']], ['プ',['pu']], ['ペ',['pe']], ['ポ',['po']],
  ['マ',['ma']], ['ミ',['mi']], ['ム',['mu']], ['メ',['me']], ['モ',['mo']],
  ['ヤ',['ya']], ['ユ',['yu']], ['ヨ',['yo']],
  ['ラ',['ra']], ['リ',['ri']], ['ル',['ru']], ['レ',['re']], ['ロ',['ro']],
  ['ワ',['wa']], ['ン',['n','nn']],
  ['ガ',['ga']], ['ギ',['gi']], ['グ',['gu']], ['ゲ',['ge']], ['ゴ',['go']],
  ['ザ',['za']], ['ジ',['ji','zi']], ['ズ',['zu']], ['ゼ',['ze']], ['ゾ',['zo']],
  ['ダ',['da']], ['デ',['de']], ['ド',['do']],
  ['ッ',['xtu','ltu']],
  ['ー',['-']], ['、',[',']], ['。',['.']], ['！',['!']], ['？',['?']], ['…',['...']],
];

const KMAP = new Map(TABLE);
const KEYS = [...KMAP.keys()].sort((a,b) => b.length - a.length);

const PHRASES = [
  { disp:'荒川に振替とりに行って来て',               kana:'あらかわにふりかえとりにいってきて' },
  { disp:'一旦カート回収お願いします。',              kana:'いったんかーとかいしゅうおねがいします。' },
  { disp:'上の人呼んで',                              kana:'うえのひとよんで' },
  { disp:'英語分かる人いる？',                        kana:'えいごわかるひといる？' },
  { disp:'オリコンの大きさ違うじゃん！',              kana:'おりこんのおおきさちがうじゃん！' },
  { disp:'カートが道においてあるって電話が入ってます', kana:'かーとがみちにおいてあるってでんわがはいってます' },
  { disp:'救急車呼んで！',                            kana:'きゅうきゅうしゃよんで！' },
  { disp:'苦情はどこで言ったらいいの？',              kana:'くじょうはどこでいったらいいの？' },
  { disp:'健康診断は決まって休みの日',                kana:'けんこうしんだんはきまってやすみのひ' },
  { disp:'小高常務の売り場づくりセンス',              kana:'こだかじょうむのうりばづくりせんす' },
  { disp:'Yeah, we global — JOYFUL Honda,',           kana:null },
  { disp:'Building dreams from Kanto to Uganda.',     kana:null },
  { disp:'Power tools, garden gear, all in stock,',   kana:null },
  { disp:'Open the doors, 6AM — tick to tock.',       kana:null },
];

// ================================================================
// セグメント構築
// ================================================================
function buildSegments(phrase) {
  const segs = [];
  const src = phrase.kana !== null ? phrase.kana : phrase.disp;
  let i = 0;
  while (i < src.length) {
    const c = src[i];
    if (c.charCodeAt(0) < 128) {
      if (c === ' ') { i++; continue; }
      segs.push({ disp: c, pats: [c.toLowerCase()], isN: false, isXtu: false, ascii: true });
      i++; continue;
    }
    let matched = false;
    for (const k of KEYS) {
      if (src.slice(i, i + k.length) === k) {
        segs.push({ disp: k, pats: [...KMAP.get(k)], isN: k==='ん'||k==='ン', isXtu: k==='っ'||k==='ッ', ascii: false });
        i += k.length; matched = true; break;
      }
    }
    if (!matched) { segs.push({ disp: c, pats: [c], isN: false, isXtu: false, ascii: false }); i++; }
  }
  // っ → 次の子音2連打
  for (let s = 0; s < segs.length - 1; s++) {
    if (segs[s].isXtu) {
      const nc = segs[s+1].pats[0][0];
      if (/[bcdfghjklmnpqrstvwxyz]/.test(nc)) segs[s].pats.push(nc + nc);
    }
  }
  return segs;
}

// ================================================================
// ゲーム状態
// ================================================================
let pIdx=0, segs=[], segIdx=0, buf='';
let missCount=0, totalTyped=0;
let startTime=null, timerInt=null;
let active=false;

const inp = document.getElementById('inp');

function focusInput() {
  inp.focus();
  document.getElementById('tap-hint').classList.add('active');
  document.getElementById('tap-hint').textContent = '⌨️ キーボード入力中…';
}

function show(id) {
  ['scr-start','scr-game','scr-result'].forEach(s =>
    document.getElementById(s).style.display = (s===id ? '' : 'none')
  );
}

function startGame() {
  pIdx=0; missCount=0; totalTyped=0;
  startTime=null; clearInterval(timerInt);
  document.getElementById('s-tot').textContent = PHRASES.length;
  active = true;
  show('scr-game');
  loadPhrase();
  setTimeout(focusInput, 300);
}

function loadPhrase() {
  segs = buildSegments(PHRASES[pIdx]);
  segIdx=0; buf='';
  inp.value='';
  document.getElementById('s-idx').textContent = pIdx+1;
  document.getElementById('prog').style.width = (pIdx/PHRASES.length*100)+'%';
  document.getElementById('err').textContent = '';
  render();
}

function render() {
  const el = document.getElementById('phrase');
  el.innerHTML = '';
  for (let s=0; s<segs.length; s++) {
    const sp = document.createElement('span');
    sp.textContent = segs[s].disp;
    sp.className = s<segIdx ? 'c-done' : s===segIdx ? 'c-cur' : 'c-pend';
    el.appendChild(sp);
  }
  if (segIdx < segs.length) {
    const cur = segs[segIdx].pats[0];
    const rest = segs.slice(segIdx+1, segIdx+12).map(s=>s.pats[0]).join('');
    document.getElementById('hint').textContent = '→ ' + buf + cur.slice(buf.length) + rest;
  } else {
    document.getElementById('hint').textContent = '';
  }
}

function updateStats() {
  const acc = totalTyped>0 ? Math.round((totalTyped-missCount)/totalTyped*100) : 100;
  document.getElementById('s-acc').textContent = acc;
  document.getElementById('s-miss').textContent = missCount;
}

// ================================================================
// 入力処理：inputイベント（スマホ対応）+ keydownイベント（PC対応）
// ================================================================

// PC用：keydown
document.addEventListener('keydown', function(e) {
  if (!active) return;
  if (segIdx >= segs.length) return;
  if (e.key.length !== 1) return;
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  e.preventDefault();
  startTimer();
  processChar(e.key.toLowerCase());
  inp.value = '';
  updateStats(); render();
  if (segIdx >= segs.length) nextPhrase();
});

// スマホ用：inputイベント（IMEを使わない英数字入力を前提）
inp.addEventListener('input', function() {
  if (!active) return;
  const val = inp.value;
  if (!val) return;
  startTimer();
  for (const ch of val.toLowerCase()) {
    if (segIdx >= segs.length) break;
    processChar(ch);
  }
  inp.value = '';
  updateStats(); render();
  if (segIdx >= segs.length) nextPhrase();
});

// フォーカス外れたら表示を戻す
inp.addEventListener('blur', function() {
  if (active) {
    document.getElementById('tap-hint').classList.remove('active');
    document.getElementById('tap-hint').textContent = '⌨️ ここをタップしてキーボードを開く';
  }
});

function startTimer() {
  if (!startTime) {
    startTime = Date.now();
    timerInt = setInterval(() => {
      document.getElementById('s-time').textContent =
        ((Date.now()-startTime)/1000).toFixed(1);
    }, 100);
  }
}

// ================================================================
// 文字処理
// ================================================================
function processChar(ch) {
  if (segIdx >= segs.length) return;
  const seg = segs[segIdx];

  if (seg.ascii) {
    if (ch === seg.pats[0]) { segIdx++; totalTyped++; document.getElementById('err').textContent=''; }
    else { missCount++; totalTyped++; document.getElementById('err').textContent='× ミス！「'+seg.pats[0]+'」を入力'; }
    return;
  }

  if (seg.isN) {
    if (ch === 'n') {
      const newBuf = buf + 'n';
      if (newBuf === 'nn') {
        segIdx++; totalTyped++; buf=''; document.getElementById('err').textContent='';
      } else {
        const next = segs[segIdx+1];
        const nf = next ? next.pats[0][0] : '';
        if (!next || !/^[aiueoyn]/.test(nf)) {
          segIdx++; totalTyped++; buf=''; document.getElementById('err').textContent='';
        } else {
          buf='n'; totalTyped++;
        }
      }
    } else if (buf === 'n') {
      segIdx++; totalTyped++; buf=''; document.getElementById('err').textContent='';
      if (segIdx < segs.length) processChar(ch);
    } else { miss(seg); }
    return;
  }

  if (seg.isXtu) {
    const newBuf = buf + ch;
    if ('xtu'.startsWith(newBuf) || 'ltu'.startsWith(newBuf)) {
      if (newBuf==='xtu'||newBuf==='ltu') { segIdx++; totalTyped++; buf=''; document.getElementById('err').textContent=''; }
      else { buf=newBuf; totalTyped++; document.getElementById('err').textContent=''; }
      return;
    }
    const dbl = seg.pats.find(p=>p.length===2&&p[0]===p[1]);
    if (dbl && buf==='' && ch===dbl[0]) {
      segIdx++; totalTyped++; buf=''; document.getElementById('err').textContent='';
      if (segIdx < segs.length) processChar(ch);
      return;
    }
    miss(seg); return;
  }

  const newBuf = buf + ch;
  if (seg.pats.some(p=>p.startsWith(newBuf))) {
    const exact = seg.pats.find(p=>p===newBuf);
    if (exact) { segIdx++; totalTyped++; buf=''; document.getElementById('err').textContent=''; }
    else { buf=newBuf; totalTyped++; document.getElementById('err').textContent=''; }
  } else {
    missCount++;
    buf = '';
    if (seg.pats.some(p=>p.startsWith(ch))) {
      const exact2 = seg.pats.find(p=>p===ch);
      if (exact2) { segIdx++; totalTyped++; document.getElementById('err').textContent=''; }
      else { buf=ch; totalTyped++; document.getElementById('err').textContent=''; }
    } else {
      totalTyped++;
      document.getElementById('err').textContent = '× ミス！「'+seg.pats[0]+'」を入力';
    }
  }
}

function miss(seg) {
  missCount++; totalTyped++; buf='';
  document.getElementById('err').textContent = '× ミス！「'+seg.pats[0]+'」を入力';
}

function nextPhrase() {
  pIdx++; buf=''; inp.value='';
  if (pIdx >= PHRASES.length) { endGame(); return; }
  loadPhrase();
  setTimeout(focusInput, 100);
}

function skipPhrase() {
  const rem = segs.length - segIdx;
  missCount+=rem; totalTyped+=rem;
  nextPhrase(); updateStats();
}

function endGame() {
  active=false; clearInterval(timerInt); inp.blur();
  const t = startTime ? ((Date.now()-startTime)/1000).toFixed(1) : 0;
  const acc = totalTyped>0 ? Math.round((totalTyped-missCount)/totalTyped*100) : 100;
  document.getElementById('r-time').textContent = t+'s';
  document.getElementById('r-acc').textContent = acc+'%';
  document.getElementById('r-miss').textContent = missCount;
  document.getElementById('prog').style.width = '100%';
  show('scr-result');
}

document.getElementById('btn-start').addEventListener('click', startGame);
document.getElementById('btn-skip').addEventListener('click', skipPhrase);
document.getElementById('btn-retry').addEventListener('click', startGame);
document.getElementById('phrase').addEventListener('click', focusInput);
</script>
</body>
</html>
